name: PR · Quality Gate
# Esteira de qualidade para Pull Requests no AgendaPro.
# ─ Nota: o projeto usa .NET 10 (global.json). O SDK é resolvido automaticamente
#   via `global-json-file: global.json` em vez de fixar uma versão.

on:
  pull_request:
    branches: [main, master, develop]
    types: [opened, synchronize, reopened]

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true
  RESULTS_DIR: TestResults

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 – Validação Arquitetural
  # Roda primeiro, independente dos outros jobs.
  # ─────────────────────────────────────────────
  architecture-check:
    name: Architecture Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate layer dependencies
        run: |
          chmod +x scripts/validate-architecture.sh
          bash scripts/validate-architecture.sh

  # ─────────────────────────────────────────────
  # JOB 2 – Build & Format
  # ─────────────────────────────────────────────
  build-and-format:
    name: Build & Format Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        # Usa global.json (SDK 10.0.100 + latestFeature).
        # O projeto alvo é net10.0; usar dotnet-version: '8.0.x' quebraria o build.
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore AgendaPro.sln

      - name: Build (Release, warnings-as-errors)
        run: dotnet build AgendaPro.sln --no-restore --configuration Release -warnaserror

      - name: Verify formatting
        run: dotnet format AgendaPro.sln --verify-no-changes --no-restore
        # Se falhar: execute `dotnet format AgendaPro.sln` localmente e commite as correções.

  # ─────────────────────────────────────────────
  # JOB 3 – Tests & Coverage
  # ─────────────────────────────────────────────
  test-and-coverage:
    name: Tests & Coverage Gate
    runs-on: ubuntu-latest
    needs: [architecture-check, build-and-format]
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore AgendaPro.sln

      - name: Build (Release)
        run: dotnet build AgendaPro.sln --no-restore --configuration Release

      # ── Testes unitários ──────────────────────
      - name: Run AgendaPro.UnitTests
        run: |
          dotnet test tests/AgendaPro.UnitTests/AgendaPro.UnitTests.csproj \
            --no-build \
            --configuration Release \
            --collect:"XPlat Code Coverage" \
            --results-directory "${{ env.RESULTS_DIR }}/UnitTests" \
            --settings coverlet.runsettings \
            --logger "trx;LogFileName=unit-tests.trx" \
            --verbosity normal

      # ── Testes de integração ──────────────────
      - name: Run AgendaPro.Tests
        run: |
          dotnet test tests/AgendaPro.Tests/AgendaPro.Tests.csproj \
            --no-build \
            --configuration Release \
            --collect:"XPlat Code Coverage" \
            --results-directory "${{ env.RESULTS_DIR }}/IntegrationTests" \
            --settings coverlet.runsettings \
            --logger "trx;LogFileName=integration-tests.trx" \
            --verbosity normal

      # ── Instalar ReportGenerator ──────────────
      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      # ── Relatório de cobertura ────────────────
      - name: Generate combined coverage report
        run: |
          reportgenerator \
            -reports:"${{ env.RESULTS_DIR }}/**/coverage.cobertura.xml" \
            -targetdir:CoverageReport \
            -reporttypes:"Cobertura;HtmlInline;MarkdownSummaryGithub;TextSummary" \
            -assemblyfilters:"+AgendaPro.*;-AgendaPro.Tests*;-AgendaPro.UnitTests*" \
            -title:"AgendaPro Coverage" \
            -tag:"PR-${{ github.event.pull_request.number }}"

      # ── Mostrar resumo no log ─────────────────
      - name: Print coverage summary
        run: cat CoverageReport/Summary.txt

      # ── Validar cobertura mínima ──────────────
      - name: Validate coverage thresholds
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET
          import sys

          tree = ET.parse('CoverageReport/Cobertura.xml')
          root = tree.getroot()
          failures = []

          # 1. Global ≥ 80%
          global_rate = float(root.attrib.get('line-rate', 0))
          global_pct  = round(global_rate * 100, 2)
          print(f'Global line coverage : {global_pct}%')
          if global_pct < 80:
              failures.append(f'Global coverage {global_pct}% < 80% (obrigatório)')

          # 2. Domain e Application ≥ 85%
          layer_lines = {}
          layer_hits  = {}

          for pkg in root.iter('package'):
              pkg_name = pkg.attrib.get('name', '')
              for clazz in pkg.iter('class'):
                  for layer in ('AgendaPro.Domain', 'AgendaPro.Application'):
                      hit = (pkg_name.startswith(layer) or
                             clazz.attrib.get('filename','')
                                   .replace('\\','/').find(layer.replace('.','/')) != -1)
                      if hit:
                          for line in clazz.iter('line'):
                              layer_lines[layer] = layer_lines.get(layer, 0) + 1
                              if int(line.attrib.get('hits', 0)) > 0:
                                  layer_hits[layer] = layer_hits.get(layer, 0) + 1

          for layer in ('AgendaPro.Domain', 'AgendaPro.Application'):
              total = layer_lines.get(layer, 0)
              if total == 0:
                  print(f'{layer}: sem linhas instrumentadas — pulando validação')
                  continue
              pct = round(layer_hits.get(layer, 0) / total * 100, 2)
              print(f'{layer} coverage: {pct}%')
              if pct < 85:
                  failures.append(f'{layer} coverage {pct}% < 85% (obrigatório)')

          if failures:
              for f in failures:
                  print(f'::error::{f}')
              sys.exit(1)
          print('Todos os thresholds de cobertura foram atendidos.')
          EOF

      # ── Comentar resumo no PR ─────────────────
      - name: Post coverage summary to PR
        if: always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          path: CoverageReport/SummaryGithub.md

      # ── Artifacts ────────────────────────────
      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-pr-${{ github.event.pull_request.number }}
          path: CoverageReport/
          retention-days: 14

      - name: Upload test results (TRX)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-pr-${{ github.event.pull_request.number }}
          path: ${{ env.RESULTS_DIR }}/**/*.trx
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 4 – SonarCloud (opcional)
  # Descomente e adicione os secrets SONAR_TOKEN,
  # SONAR_PROJECT_KEY e SONAR_ORGANIZATION.
