name: PR · Quality Gate
# Esteira de qualidade para Pull Requests no AgendaPro.
# ─ Nota: o projeto usa .NET 10 (global.json). O SDK é resolvido automaticamente
#   via `global-json-file: global.json` em vez de fixar uma versão.

on:
  pull_request:
    branches: [main, master, develop]
    types: [opened, synchronize, reopened]

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true
  RESULTS_DIR: TestResults

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 – Validação Arquitetural
  # Roda primeiro, independente dos outros jobs.
  # ─────────────────────────────────────────────
  architecture-check:
    name: Architecture Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate layer dependencies
        run: |
          chmod +x scripts/validate-architecture.sh
          bash scripts/validate-architecture.sh

  # ─────────────────────────────────────────────
  # JOB 2 – Build & Format
  # ─────────────────────────────────────────────
  build-and-format:
    name: Build & Format Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        # Usa global.json (SDK 10.0.100 + latestFeature).
        # O projeto alvo é net10.0; usar dotnet-version: '8.0.x' quebraria o build.
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore AgendaPro.sln

      - name: Build (Release)
        run: dotnet build AgendaPro.sln --no-restore --configuration Release

      - name: Format check (non-blocking)
        run: dotnet format AgendaPro.sln --no-restore
        continue-on-error: true
        # Esta etapa sugere formatação, mas não falha o PR automaticamente.

  # ─────────────────────────────────────────────
  # JOB 3 – Tests & Coverage
  # ─────────────────────────────────────────────
  test-and-coverage:
    name: Tests & Coverage Gate
    runs-on: ubuntu-latest
    needs: [architecture-check, build-and-format]
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore AgendaPro.sln

      - name: Build (Release)
        run: dotnet build AgendaPro.sln --no-restore --configuration Release

      # ── Testes unitários ──────────────────────
      - name: Run AgendaPro.UnitTests
        run: |
          dotnet test tests/AgendaPro.UnitTests/AgendaPro.UnitTests.csproj \
            --no-build \
            --configuration Release \
            --collect:"XPlat Code Coverage" \
            --results-directory "${{ env.RESULTS_DIR }}/UnitTests" \
            --settings coverlet.runsettings \
            --logger "trx;LogFileName=unit-tests.trx" \
            --verbosity normal

      # ── Testes de integração ──────────────────
      - name: Run AgendaPro.Tests
        run: |
          dotnet test tests/AgendaPro.Tests/AgendaPro.Tests.csproj \
            --no-build \
            --configuration Release \
            --collect:"XPlat Code Coverage" \
            --results-directory "${{ env.RESULTS_DIR }}/IntegrationTests" \
            --settings coverlet.runsettings \
            --logger "trx;LogFileName=integration-tests.trx" \
            --verbosity normal

      # ── Instalar ReportGenerator ──────────────
      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      # ── Relatório de cobertura ────────────────
      - name: Generate combined coverage report
        run: |
          reportgenerator \
            -reports:"${{ env.RESULTS_DIR }}/**/coverage.cobertura.xml" \
            -targetdir:CoverageReport \
            -reporttypes:"Cobertura;HtmlInline;MarkdownSummaryGithub;TextSummary" \
            -assemblyfilters:"+AgendaPro.*;-AgendaPro.Tests*;-AgendaPro.UnitTests*" \
            -title:"AgendaPro Coverage" \
            -tag:"PR-${{ github.event.pull_request.number }}"

      # ── Mostrar resumo no log ─────────────────
      - name: Print coverage summary
        run: cat CoverageReport/Summary.txt

      # ── Validar cobertura mínima ──────────────
      - name: Validate coverage thresholds
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET
          import os
          import subprocess
          import sys

          def normalize(path):
              return path.replace('\\', '/').lstrip('./')

          def coverage_pct(hits, total):
              return round(hits / total * 100, 2) if total else 0.0

          def changed_source_files():
              base_ref = os.environ.get('GITHUB_BASE_REF')
              if not base_ref:
                  return []
              try:
                  diff = subprocess.check_output(
                      ['git', 'diff', '--name-only', f'origin/{base_ref}...HEAD'],
                      text=True,
                      stderr=subprocess.DEVNULL,
                  )
                  return [normalize(path) for path in diff.splitlines() if path.strip()]
              except subprocess.CalledProcessError:
                  return []

          def matches_changed_file(filename, changed_files):
              normalized = normalize(filename)
              for changed in changed_files:
                  if normalized.endswith(changed) or changed.endswith(normalized):
                      return True
              return False

          tree = ET.parse('CoverageReport/Cobertura.xml')
          root = tree.getroot()

          changed_files = [path for path in changed_source_files()
                           if path.startswith(('src/AgendaPro.Domain/', 'src/AgendaPro.Application/')) and path.endswith('.cs')]
          print('Changed source files:')
          for path in sorted(changed_files):
              print(f' - {path}')

          if not changed_files:
              print('No modified AgendaPro source files were detected. Skipping changed-file coverage validation.')
              sys.exit(0)

          layer_lines = {'AgendaPro.Domain': 0, 'AgendaPro.Application': 0}
          layer_hits = {'AgendaPro.Domain': 0, 'AgendaPro.Application': 0}
          changed_lines = 0
          changed_hits = 0

          for pkg in root.iter('package'):
              for clazz in pkg.iter('class'):
                  filename = normalize(clazz.attrib.get('filename', ''))
                  if not matches_changed_file(filename, changed_files):
                      continue

                  layer = None
                  if 'src/AgendaPro.Domain/' in filename or 'AgendaPro.Domain/' in filename:
                      layer = 'AgendaPro.Domain'
                  elif 'src/AgendaPro.Application/' in filename or 'AgendaPro.Application/' in filename:
                      layer = 'AgendaPro.Application'

                  for line in clazz.iter('line'):
                      changed_lines += 1
                      hits = int(line.attrib.get('hits', 0))
                      if hits > 0:
                          changed_hits += 1
                          if layer:
                              layer_hits[layer] += 1
                      if layer:
                          layer_lines[layer] += 1

          if changed_lines == 0:
              print('Nenhuma linha instrumentada encontrada nos arquivos modificados. Verifique se os nomes dos arquivos aparecem no relatório Cobertura.')
              sys.exit(0)

          changed_pct = coverage_pct(changed_hits, changed_lines)
          print(f'Changed-file coverage: {changed_pct}%')

          failures = []
          if changed_pct < 80:
              failures.append(f'Changed-file global coverage {changed_pct}% < 80% (obrigatório)')

          for layer in ('AgendaPro.Domain', 'AgendaPro.Application'):
              total = layer_lines.get(layer, 0)
              if total == 0:
                  print(f'{layer}: sem linhas instrumentadas nos arquivos modificados — pulando validação')
                  continue
              pct = coverage_pct(layer_hits.get(layer, 0), total)
              print(f'{layer} changed-file coverage: {pct}%')
              if pct < 85:
                  failures.append(f'{layer} changed-file coverage {pct}% < 85% (obrigatório)')

          if failures:
              for f in failures:
                  print(f'::error::{f}')
              sys.exit(1)
          print('Todos os thresholds de cobertura para arquivos modificados foram atendidos.')
          EOF

      # ── Comentar resumo no PR ─────────────────
      - name: Post coverage summary to PR
        if: always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          path: CoverageReport/SummaryGithub.md

      # ── Artifacts ────────────────────────────
      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-pr-${{ github.event.pull_request.number }}
          path: CoverageReport/
          retention-days: 14

      - name: Upload test results (TRX)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-pr-${{ github.event.pull_request.number }}
          path: ${{ env.RESULTS_DIR }}/**/*.trx
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 4 – SonarCloud (opcional)
  # Descomente e adicione os secrets SONAR_TOKEN,
  # SONAR_PROJECT_KEY e SONAR_ORGANIZATION.
